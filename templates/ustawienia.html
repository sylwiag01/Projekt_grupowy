<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ustawienia - GlikoKids</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: #4e73df; }
        .settings-card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .settings-header { background-color: #fff; border-bottom: 1px solid #edf2f9; padding: 1.25rem; border-radius: 15px 15px 0 0; }
        .icon-box { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 15px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="baza_rodzic.html">
                <i class="fas fa-heartbeat"></i> GlikoKids
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="rodzic.html"><i class="fas fa-chart-pie me-1"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="historia_rodzic.html"><i class="fas fa-history me-1"></i> Historia Posiłków</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="baza_rodzic.html"><i class="fas fa-apple-alt me-1"></i> Baza Produktów</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white d-flex align-items-center active" href="#" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle fa-lg me-2"></i> Tata Ani
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow">
                            <li><a class="dropdown-item active" href="ustawienia.html">Ustawienia</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#">Wyloguj się</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="h4 text-gray-800 mb-4">Ustawienia Systemu</h2>

        <div class="row">
            <div class="col-lg-6">
                <div class="card settings-card">
                    <div class="settings-header d-flex align-items-center">
                        <div class="icon-box bg-primary text-white"><i class="fas fa-user-shield"></i></div>
                        <h5 class="mb-0">Twój Profil (Rodzic)</h5>
                    </div>
                    <div class="card-body">
                        <form>
                            <div class="mb-3">
                                <label class="form-label text-muted small">Imię i nazwisko</label>
                                <input type="text" class="form-control" value="Jan Kowalski">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small">Adres E-mail</label>
                                <input type="email" class="form-control" value="tata.ani@email.com">
                            </div>
                            <button type="button" class="btn btn-outline-primary btn-sm">Zmień hasło</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card settings-card">
                    <div class="settings-header d-flex align-items-center">
                        <div class="icon-box bg-success text-white"><i class="fas fa-child"></i></div>
                        <h5 class="mb-0">Profil Dziecka</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label text-muted small">Imię dziecka</label>
                            <input type="text" class="form-control" value="Ania">
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label text-muted small">Dzienny cel WW</label>
                                <input type="number" class="form-control" value="12.0" step="0.5">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label text-muted small">Dzienny cel WBT</label>
                                <input type="number" class="form-control" value="4.0" step="0.5">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Wybrany Avatar</label>
                            <select class="form-select">
                                <option selected>Smok DiaBohater</option>
                                <option>Super Jabłko</option>
                                <option>Kot Liczy-Węgle</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <div class="card settings-card">
                    <div class="settings-header d-flex align-items-center">
                        <div class="icon-box bg-warning text-white"><i class="fas fa-bell"></i></div>
                        <h5 class="mb-0">Powiadomienia i Integracje</h5>
                    </div>
                    <div class="card-body">
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="pushNotif" checked>
                            <label class="form-check-label" for="pushNotif">Powiadomienia Push o posiłkach do zatwierdzenia</label>
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="emailSum" checked>
                            <label class="form-check-label" for="emailSum">Tygodniowy raport postępów na e-mail</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-end mb-5">
            <button class="btn btn-secondary me-2">Anuluj</button>
            <button class="btn btn-primary px-4">Zapisz wszystkie zmiany</button>
        </div>

        <footer class="text-center text-muted pb-4">
            <small>&copy; 2026 GlikoKids Team</small>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
