<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GlikoKids – Panel dziecka | Nauka o jedzeniu i cukrzycy</title>
    <meta name="description"
        content="GlikoKids to interaktywny panel dla dzieci uczący o jedzeniu, wymiennikach WW i WBT poprzez zabawę, quizy i gry.">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../style/main.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <nav class="navbar navbar-dark mb-3">
            <div class="container text-center">
                <a href="dziecko.html" class="navbar-brand mx-auto logo mb-0 text-decoration-none">
                    <i class="fas fa-star star-animate"></i> GlikoKids
                </a>
            </div>
        </nav>
        <nav class="container mb-4" aria-label="Główna nawigacja dziecka">
            <div class="kid-navbar d-flex justify-content-around align-items-center p-3 rounded-4 shadow">

                <a href="gra.html" class="nav-item text-center" aria-label="Gra edukacyjna">
                    <div class="icon-circle bg-danger">
                        <i class="fas fa-gamepad"></i>
                    </div>
                    <span>GRY</span>
                </a>

                <a href="quiz.html" class="nav-item text-center" aria-label="Quiz wiedzy">
                    <div class="icon-circle bg-success">
                        <i class="fas fa-question"></i>
                    </div>
                    <span>QUIZ</span>
                </a>

                <a href="posilek.html" class="nav-item text-center" aria-label="Zapisz posiłek">
                    <div class="icon-circle bg-warning">
                        <i class="fas fa-utensils"></i>
                    </div>
                    <span>POSIŁEK</span>
                </a>

            </div>
        </nav>
    </header>

    <main class="container text-center">

        <!-- PANEL GRACZA -->
        <section class="player-panel p-4 mb-4 rounded-4 shadow">

            <div class="row align-items-center">

                <!-- AVATAR -->
                <div class="col-4 col-md-3 text-center">
                    <div class="avatar-box" onclick="petClick()">
                        🐻
                    </div>

                    <div id="pet-message" class="pet-message">
                        Zdobądźmy razem więcej gwiazdek! ⭐
                    </div>
                </div>

                <!-- PROGRES -->
                <div class="col-8 col-md-9 text-start">

                    <h4 class="mb-2">Poziom: <span class="level-name">Odkrywca 🚀</span></h4>

                    <div class="progress mb-3" role="progressbar" aria-label="Postęp gracza">
                        <div class="progress-bar bg-success progress-animated" style="width: 45%">
                            45%
                        </div>
                    </div>

                    <!-- NAGRODY -->
                    <div class="d-flex gap-3 rewards">
                        <span><i class="fas fa-star text-warning"></i> 12</span>
                        <span><i class="fas fa-coins text-warning"></i> 8</span>
                    </div>

                </div>

            </div>

        </section>
        <section class="friends-box p-4 mb-4 rounded-4 shadow">

            <h4 class="text-center mb-3">👧 Twoi znajomi</h4>

            <div class="row text-center">

                <div class="col-4">
                    <div class="friend-card">
                        🧒
                        <p class="fw-bold mb-0">Kuba</p>
                        <small>Poziom: Bohater 🦸</small>
                    </div>
                </div>

                <div class="col-4">
                    <div class="friend-card">
                        👧
                        <p class="fw-bold mb-0">Ola</p>
                        <small>Poziom: Mistrz 🏆</small>
                    </div>
                </div>

                <div class="col-4">
                    <div class="friend-card">
                        🧑
                        <p class="fw-bold mb-0">Antek</p>
                        <small>Poziom: Odkrywca 🚀</small>
                    </div>
                </div>

            </div>

        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function petClick() {
            const msg = document.getElementById("pet-message");
            msg.style.display = "block";
        }
    </script>
</body>

</html>
