<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aktywność Dziecka – GlikoKids</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
    .navbar { background-color: #4e73df; }

    .type-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px;
                  border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; }
    .type-quiz  { background: #e8f4fd; color: #1a73e8; }
    .type-game  { background: #fef3e8; color: #e87f24; }
    .type-meal  { background: #e8f8f0; color: #27ae60; }

    .score-stars { color: #ffc81e; letter-spacing: 2px; }

    .today-item {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 16px; border-radius: 12px; background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 10px;
    }
    .today-icon { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
                  display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .today-icon.quiz { background: #e8f4fd; }
    .today-icon.game { background: #fef3e8; }
    .today-icon.meal { background: #e8f8f0; }

    .page-link { cursor: pointer; }
    .empty-state { padding: 36px; text-align: center; color: #adb5bd; }
    .empty-state i { font-size: 2rem; margin-bottom: 10px; display: block; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark mb-4 shadow-sm">
    <div class="container">
      <a class="navbar-brand font-weight-bold" href="/rodzic">
        <i class="fas fa-heartbeat"></i> GlikoKids
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="/rodzic"><i class="fas fa-chart-pie me-1"></i> Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="/aktywnosc_dziecka"><i class="fas fa-child me-1"></i> Aktywność Dziecka</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/historia_rodzic"><i class="fas fa-history me-1"></i> Historia Posiłków</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/baza_rodzic"><i class="fas fa-apple-alt me-1"></i> Baza Produktów</a>
          </li>
        </ul>
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle text-white d-flex align-items-center" href="#" data-bs-toggle="dropdown">
              <i class="fas fa-user-circle fa-lg me-2"></i> Tata Ani
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow">
              <li><a class="dropdown-item" href="#">Ustawienia</a></li>
              <li><a class="dropdown-item text-danger" href="#">Wyloguj się</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container pb-5">

    <!-- ── Today (last 5) ──────────────────────────────────────────────── -->
    <div class="card shadow-sm mb-4">
      <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
        <h6 class="m-0 fw-bold text-primary">
          <i class="fas fa-sun me-2 text-warning"></i>Dzisiaj
        </h6>
        <span class="badge bg-secondary" id="today-count">…</span>
      </div>
      <div class="card-body" id="today-list">
        <div class="empty-state">
          <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
          <p class="mt-2 mb-0 small">Ładowanie…</p>
        </div>
      </div>
    </div>

    <!-- ── Full history ────────────────────────────────────────────────── -->
    <div class="card shadow-sm">
      <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
        <h6 class="m-0 fw-bold text-primary">
          <i class="fas fa-history me-2"></i>Cała historia aktywności
        </h6>
        <span class="badge bg-secondary" id="history-count">…</span>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th class="ps-3">Kiedy</th>
                <th>Typ</th>
                <th>Wynik</th>
                <th>Szczegóły</th>
              </tr>
            </thead>
            <tbody id="history-tbody">
              <tr><td colspan="4" class="empty-state">
                <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="card-footer bg-white">
        <nav><ul class="pagination pagination-sm justify-content-center mb-0" id="pagination"></ul></nav>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const CHILD_ID = {{ child_id }};

    const TYPE_LABEL = { quiz: 'Quiz', game: 'Gra', meal: 'Posiłek' };
    const TYPE_ICON  = { quiz: '🎯', game: '🎮', meal: '🍽️' };

    function fmtDatetime(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit', year: 'numeric' })
           + ' ' + d.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
    }
    function fmtTime(iso) {
      return new Date(iso).toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
    }

    function typeBadge(type) {
      return `<span class="type-badge type-${type}">${TYPE_ICON[type] || '📌'} ${TYPE_LABEL[type] || type}</span>`;
    }

    function scoreHtml(a) {
      if (a.activity_type === 'game') {
        const s = Math.round(a.score || 0);
        return `<span class="score-stars">${'⭐'.repeat(s) || '—'}</span>`;
      }
      if (a.activity_type === 'quiz') {
        const pct = a.score !== null ? Math.round(a.score) : null;
        if (pct === null) return '—';
        const cls = pct >= 80 ? 'text-success' : pct >= 50 ? 'text-warning' : 'text-danger';
        return `<span class="fw-bold ${cls}">${pct}%</span>`;
      }
      if (a.activity_type === 'meal') {
        return a.score !== null ? `<span class="fw-bold text-primary">${a.score} WW</span>` : '—';
      }
      return '—';
    }

    function detailsText(a) {
      const d = a.details || {};
      if (a.activity_type === 'quiz') return `${d.correct ?? '?'}/${d.total ?? '?'} poprawnych`;
      if (a.activity_type === 'game') return d.level_name || ('Poziom ' + d.level);
      if (a.activity_type === 'meal') return (d.meal_name || '').slice(0, 32) || '—';
      return '';
    }

    // ── Today ─────────────────────────────────────────────────────────────
    async function loadToday() {
      const list  = document.getElementById('today-list');
      const badge = document.getElementById('today-count');
      try {
        const items = await fetch(`/api/activity/${CHILD_ID}/today`).then(r => r.json());
        badge.textContent = `${items.length} dziś`;
        if (!items.length) {
          list.innerHTML = `<div class="empty-state"><i class="fas fa-moon"></i><p class="mb-0">Brak aktywności dzisiaj.</p></div>`;
          return;
        }
        list.innerHTML = items.map(a => `
          <div class="today-item">
            <div class="today-icon ${a.activity_type}">${TYPE_ICON[a.activity_type] || '📌'}</div>
            <div class="flex-grow-1">
              <div class="d-flex justify-content-between align-items-center">
                <strong>${TYPE_LABEL[a.activity_type] || a.activity_type}</strong>
                <span class="text-muted small">${fmtTime(a.created_at)}</span>
              </div>
              <div class="d-flex gap-3 mt-1 align-items-center">
                ${scoreHtml(a)}
                <span class="text-muted small">${detailsText(a)}</span>
              </div>
            </div>
          </div>`).join('');
      } catch (e) {
        list.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle text-danger"></i><p class="mb-0">Błąd ładowania.</p></div>`;
      }
    }

    // ── History with pagination ────────────────────────────────────────────
    async function loadHistory(page = 1) {
      const tbody = document.getElementById('history-tbody');
      const badge = document.getElementById('history-count');
      try {
        const data = await fetch(`/api/activity/${CHILD_ID}?page=${page}`).then(r => r.json());
        badge.textContent = `${data.total} łącznie`;

        if (!data.items.length) {
          tbody.innerHTML = `<tr><td colspan="4" class="empty-state"><i class="fas fa-inbox"></i><p>Brak historii.</p></td></tr>`;
          document.getElementById('pagination').innerHTML = '';
          return;
        }

        tbody.innerHTML = data.items.map(a => `
          <tr>
            <td class="ps-3 text-muted small text-nowrap">${fmtDatetime(a.created_at)}</td>
            <td>${typeBadge(a.activity_type)}</td>
            <td>${scoreHtml(a)}</td>
            <td class="text-muted small">${detailsText(a)}</td>
          </tr>`).join('');

        renderPagination(data.page, data.pages);
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger py-3">Błąd ładowania danych.</td></tr>`;
      }
    }

    function renderPagination(page, pages) {
      const ul = document.getElementById('pagination');
      if (pages <= 1) { ul.innerHTML = ''; return; }
      let html = `<li class="page-item ${page === 1 ? 'disabled' : ''}">
        <span class="page-link" onclick="loadHistory(${page - 1})">‹</span></li>`;
      for (let i = 1; i <= pages; i++) {
        html += `<li class="page-item ${i === page ? 'active' : ''}">
          <span class="page-link" onclick="loadHistory(${i})">${i}</span></li>`;
      }
      html += `<li class="page-item ${page === pages ? 'disabled' : ''}">
        <span class="page-link" onclick="loadHistory(${page + 1})">›</span></li>`;
      ul.innerHTML = html;
    }

    loadToday();
    loadHistory(1);
  </script>
</body>
</html>
