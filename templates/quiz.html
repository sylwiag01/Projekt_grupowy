<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Quiz – GlikoKids</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/style/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <style>
        .quiz-card    { background:#fff; border:3px solid var(--yellow); border-radius:var(--radius); padding:28px 24px; max-width:600px; margin:0 auto; }
        .question-text{ font-family:'Bubblegum Sans',cursive; font-size:1.35rem; color:var(--text); margin-bottom:22px; line-height:1.4; }
        .answer-btn   { display:block; width:100%; text-align:left; background:var(--gray); border:2px solid var(--gray-md); border-radius:var(--radius-sm); padding:12px 18px; font-size:1rem; font-weight:600; cursor:pointer; transition:transform .15s,border-color .15s,background .15s; margin-bottom:10px; }
        .answer-btn:hover:not(:disabled) { background:var(--orange-lt); border-color:var(--orange); transform:translateX(4px); }
        .answer-btn.correct { background:#eafaf1; border-color:var(--green); color:var(--green-dk); }
        .answer-btn.wrong   { background:var(--red-lt); border-color:var(--red); color:var(--red); }
        .progress-track     { background:var(--gray); border-radius:20px; height:12px; border:2px solid var(--gray-md); margin-bottom:18px; }
        .progress-bar-quiz  { height:12px; border-radius:20px; background:var(--yellow); transition:width .4s ease; }
        .feedback-text      { font-size:1rem; font-weight:700; min-height:28px; margin:14px 0 8px; }
        .score-display      { font-family:'Bubblegum Sans',cursive; font-size:3.5rem; color:var(--orange); }
        .star-row           { font-size:1.8rem; letter-spacing:3px; }
    </style>
</head>
<body>

<header class="header">
    <nav class="navbar navbar-dark mb-3">
        <div class="container text-center">
            <a href="/dziecko" class="navbar-brand mx-auto logo mb-0 text-decoration-none">
                <i class="fas fa-star star-animate"></i> GlikoKids
            </a>
        </div>
    </nav>
</header>

<div class="container mt-4" style="max-width:660px">
    <h2 class="text-center mb-1">🎯 Quiz wiedzy</h2>
    <p class="text-center mb-4" style="color:var(--text-soft)">Za każdą poprawną odpowiedź zyskasz gwiazdkę!</p>

    <!-- Quiz screen -->
    <div id="quiz-screen">
        <div class="d-flex justify-content-between align-items-center mb-1" style="font-size:.85rem;font-weight:700;color:var(--text-soft)">
            <span id="q-counter"></span>
            <span><i class="fas fa-star text-warning"></i> <span id="score-live">0</span> gwiazdek</span>
        </div>
        <div class="progress-track">
            <div class="progress-bar-quiz" id="progress-bar" style="width:0%"></div>
        </div>
        <div class="quiz-card">
            <div class="question-text" id="question-text"></div>
            <div id="answers-container"></div>
            <div class="feedback-text text-center" id="feedback-text"></div>
            <div class="text-center mt-2">
                <button class="btn btn-primary px-4" id="next-btn" style="display:none" onclick="nextQuestion()"></button>
            </div>
        </div>
    </div>

    <!-- Results screen -->
    <div id="results-screen" style="display:none">
        <div class="quiz-card text-center">
            <div id="result-emoji" style="font-size:4rem"></div>
            <div class="score-display mt-2" id="result-score"></div>
            <div class="star-row my-2" id="result-stars"></div>
            <div class="fw-bold mb-3" id="result-msg" style="font-size:1.1rem"></div>
            <div class="text-muted mb-4" style="font-size:.9rem" id="result-sub"></div>
            <div class="d-flex gap-2 justify-content-center flex-wrap">
                <button class="btn btn-primary px-4" onclick="startQuiz()">
                    <i class="fas fa-redo me-1"></i> Zagraj jeszcze raz
                </button>
                <a href="/dziecko" class="btn btn-secondary px-4">← Powrót do menu</a>
            </div>
        </div>
    </div>

    <div class="text-center mt-3">
        <a href="/dziecko" class="btn btn-secondary" id="back-btn">← Powrót do menu</a>
    </div>
</div>

<script src="/js/quiz.js"></script>
</body>
</html>
