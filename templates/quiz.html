<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Quiz – GlikoKids</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/style/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <nav class="navbar navbar-dark mb-3">
            <div class="container text-center">
                <a href="/dziecko" class="navbar-brand mx-auto logo mb-0 text-decoration-none">
                    <i class="fas fa-star star-animate"></i> GlikoKids
                </a>
            </div>
        </nav>
    </header>

    <div class="container text-center mt-4">

        <h2>🎯 Quiz wiedzy</h2>
        <h5>Za każdą poprawną odpowiedź zyskasz gwiazdkę!</h5>
        <div class="card p-4 mt-3">
            <h4>Ile gram węglowodanów ma 1 WW?</h4>

            <button class="btn btn-warning m-2" onclick="answer(false)">5g</button>
            <button class="btn btn-success m-2" onclick="answer(true)">10g</button>
            <button class="btn btn-warning m-2" onclick="answer(false)">20g</button>

            <div id="result" class="mt-3 fw-bold"></div>
        </div>

    </div>

    <script>
        function answer(correct) {
            const el = document.getElementById("result");
            if (correct) {
                el.innerHTML = "🎉 Brawo! Masz rację!";
                el.style.color = "green";
            } else {
                el.innerHTML = "😅 Spróbuj jeszcze raz!";
                el.style.color = "red";
            }
        }
    </script>

</body>

</html>
