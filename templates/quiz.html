<!DOCTYPE html>
<html lang="pl" data-theme="glikokids">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz – GlikoKids</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style/child.css">
</head>
<body class="min-h-screen">

  <!-- Floating candy background -->
  <div class="candy-bg" aria-hidden="true" id="candy-bg"></div>

  <!-- Header -->
  <div class="site-header">
    <div class="max-w-2xl mx-auto px-4 py-4 text-center">
      <a href="/dziecko" class="logo">⭐ GlikoKids</a>
    </div>
  </div>

  <div class="page-wrap max-w-2xl mx-auto px-4 py-6">
    <h2 class="text-center text-3xl font-extrabold mb-1" style="font-family:'Bubblegum Sans',cursive;animation:rainbowText 4s linear infinite">🎯 Quiz wiedzy</h2>
    <p class="text-center mb-6 text-sm font-semibold" style="color:var(--text-soft)">Za każdą poprawną odpowiedź zyskasz gwiazdkę! ⭐</p>

    <!-- Quiz screen -->
    <div id="quiz-screen">
      <div class="flex justify-between items-center mb-2 text-sm font-bold" style="color:var(--text-soft)">
        <span id="q-counter"></span>
        <span style="background:linear-gradient(135deg,#FFC81E,#FF9A3C);color:#fff;padding:4px 14px;border-radius:2rem;font-weight:800;font-size:13px;box-shadow:0 3px 10px rgba(255,200,30,0.3)">⭐ <span id="score-live">0</span> gwiazdek</span>
      </div>

      <div class="progress-track mb-4">
        <div class="progress-bar-quiz" id="progress-bar" style="width:0%"></div>
      </div>

      <div class="quiz-card">
        <div class="question-text" id="question-text"></div>
        <div id="answers-container"></div>
        <div class="feedback-text text-center" id="feedback-text"></div>
        <div class="text-center mt-3">
          <button class="btn btn-primary px-8" id="next-btn" style="display:none" onclick="nextQuestion()"></button>
        </div>
      </div>
    </div>

    <!-- Results screen -->
    <div id="results-screen" style="display:none">
      <div class="quiz-card shadow-xl text-center">
        <div id="result-emoji" style="font-size:4.5rem;animation:bounce-in .6s ease"></div>
        <div class="score-display mt-2" id="result-score"></div>
        <div class="star-row my-3" id="result-stars"></div>
        <p class="font-extrabold text-xl mb-2" id="result-msg" style="font-family:'Bubblegum Sans',cursive"></p>
        <p class="text-sm mb-6 font-semibold" id="result-sub" style="color:var(--text-soft)"></p>
        <div class="flex gap-3 justify-center flex-wrap">
          <button class="btn btn-primary px-6" onclick="startQuiz()">
            <i class="fas fa-redo mr-1"></i> Zagraj jeszcze raz
          </button>
          <a href="/dziecko" class="btn btn-outline px-6">← Powrót do menu</a>
        </div>
      </div>
    </div>

    <div class="text-center mt-4">
      <a href="/dziecko" class="btn btn-ghost" id="back-btn">← Powrót do menu</a>
    </div>
  </div>

  <script>const CHILD_ID = {{ user_id }};</script>
  <script src="/js/quiz.js"></script>
  <script>
    (function() {
      const emojis = ['⭐','💫','🌟','❓','🎯','✨','🏆','🎉','🧠','📚','💡','🎈'];
      const bg = document.getElementById('candy-bg');
      for (let i = 0; i < 14; i++) {
        const s = document.createElement('span');
        s.textContent = emojis[i % emojis.length];
        s.style.left = (Math.random() * 100) + '%';
        s.style.fontSize = (0.9 + Math.random() * 1.1) + 'rem';
        s.style.animationDuration = (8 + Math.random() * 10) + 's';
        s.style.animationDelay = (Math.random() * 14) + 's';
        bg.appendChild(s);
      }
    })();
  </script>
</body>
</html>
