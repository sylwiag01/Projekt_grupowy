<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Posiłek – GlikoKids</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../style/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
</head>

<body>
    <header class="header">
        <nav class="navbar navbar-dark mb-3">
            <div class="container text-center">
                <a href="dziecko.html" class="navbar-brand mx-auto logo mb-0 text-decoration-none">
                    <i class="fas fa-star star-animate"></i> GlikoKids
                </a>
            </div>
        </nav>
    </header>

    <div class="container text-center mt-4">

        <h2>🍽️ Mój posiłek</h2>

        <div class="card p-4 mt-3">

            <input type="text" id="meal" class="form-control mb-3" placeholder="Co zjadłeś? np. kanapka, jabłko">

            <button class="btn btn-primary" onclick="saveMeal()">Zapisz</button>

            <div id="summary" class="mt-4"></div>

        </div>
        <div class="container mt-2">
            <a href="dziecko.html" class="btn btn-secondary">
                ← Powrót do menu
            </a>
        </div>
    </div>

    <script>
        function saveMeal() {
            const meal = document.getElementById("meal").value;
            const summary = document.getElementById("summary");

            if (meal.trim() === "") {
                summary.innerHTML = "😅 Wpisz coś!";
                return;
            }

            summary.innerHTML = `
        <div class="p-3 rounded" style="background:#eafaf1">
            🎉 Super robota!<br>
            Zjadłeś: <strong>${meal}</strong><br><br>
            🌟 Dbając o jedzenie, dbasz o zdrowie!
        </div>
    `;
        }
    </script>

</body>

</html>
