<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logowanie – GlikoKids</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
    }
    .brand {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .brand-icon {
      font-size: 2.8rem;
      display: block;
      margin-bottom: 0.4rem;
    }
    .brand h1 {
      font-size: 1.7rem;
      font-weight: 700;
      color: #4e73df;
      margin: 0;
    }
    .brand p {
      color: #6c757d;
      font-size: 0.88rem;
      margin: 0.3rem 0 0;
    }
    .btn-primary {
      background-color: #4e73df;
      border-color: #4e73df;
      font-weight: 600;
      padding: 0.65rem;
    }
    .btn-primary:hover {
      background-color: #2e59d9;
      border-color: #2653d4;
    }
    .form-label { font-weight: 600; color: #495057; font-size: 0.9rem; }
    .divider { border-top: 1px solid #e3e6f0; margin: 1.5rem 0; }
    .register-link { text-align: center; font-size: 0.9rem; color: #6c757d; }
    .register-link a { color: #4e73df; font-weight: 600; text-decoration: none; }
    .register-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="brand">
      <span class="brand-icon">🩺</span>
      <h1>GlikoKids</h1>
      <p>Panel rodzica – zaloguj się do swojego konta</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label"><i class="fas fa-envelope me-1 text-muted"></i> Adres e-mail</label>
        <input type="email" class="form-control" id="email" name="email"
               placeholder="rodzic@example.com" required
               value="{{ request.form.get('email', '') }}">
      </div>
      <div class="mb-4">
        <label for="password" class="form-label"><i class="fas fa-lock me-1 text-muted"></i> Hasło</label>
        <input type="password" class="form-control" id="password" name="password"
               placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="fas fa-sign-in-alt me-2"></i> Zaloguj się
      </button>
    </form>

    <div class="divider"></div>
    <p class="register-link">
      Nie masz jeszcze konta?
      <a href="{{ url_for('register') }}">Zarejestruj się</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
